<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Shape</title>
</head>
<style>

body{
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

.container{
    position: relative;
    width: 300px;
    height: 300px;
    animation: rotateBox 6s linear infinite;
}
.shape{
    width: 100px;
    height: 100px;
    position: absolute;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}
.shape1{
    background: red;
    top: 0;
    left: 110px;
}
.shape2{
    background: blue;
    bottom: 0;
    left: 110px;
}
.shape3{
    background: green;
    left: 0;
    top: 110px;
    transform: rotate(-90deg);
}
.shape4{
    background: orange;
    right: 0;
    top: 110px;
    transform: rotate(90deg);
}
@keyframes rotateBox{
    100%{
        transform: rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>

</div>

</body>
</html>
