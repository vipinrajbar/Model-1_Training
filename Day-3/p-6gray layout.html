<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gray Layout</title>
</head>
<style>

body{
    font-family: Arial, sans-serif;
    background: #dcdcdc;
}
.header{
    background: gray;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 30px;
}
.nav{
    background: #555;
    overflow: hidden;
}

.nav a{
    float: left;
    color: white;
    text-decoration: none;
    padding: 14px 20px;
}

.nav a:hover{
    background: black;
}
.container{
    display: flex;
    margin: 20px;
}
.sidebar{
    width: 25%;
    background: #888;
    color: white;
    padding: 20px;
}
.content{
    width: 75%;
    background: #f2f2f2;
    padding: 20px;
}
.footer{
    background: gray;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}

</style>

<body>

<div class="container">


<div class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>



</body>
</html>
