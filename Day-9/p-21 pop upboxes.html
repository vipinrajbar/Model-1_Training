<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Popup Boxes</title>
</head>
<body>

<script>

alert("Welcome!");

let answer = confirm("Do you like JavaScript?");

if(answer){
    let name = prompt("Enter your name:");
    document.write("Hello " + name);
}
else{
    document.write("Thank You");
}

</script>

</body>
</html>
