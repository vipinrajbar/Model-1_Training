<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BICTOX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

html{
scroll-behavior:smooth;
}

section{
height:100vh;
padding:90px 20px;
}

.navbar{
background:#0d6efd;
}

.home{
background:linear-gradient(to right,#0d6efd,#6610f2);
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
background:white;
padding:15px;
margin-bottom:20px;
}

.form-box{
width:400px;
margin:auto;
padding:30px;
box-shadow:0 0 10px gray;
border-radius:10px;
background:white;
}

.gallery img{
width:100%;
height:250px;
border-radius:10px;
}

.contact-box{
padding:20px;
background:white;
box-shadow:0 0 10px gray;
border-radius:10px;
}

iframe{
width:100%;
height:300px;
border:0;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">

<div class="container">

<a class="navbar-brand fw-bold" href="#home">

<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png"
width="40">

BICTOX

</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#home">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#registration">Registration</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#login">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#gallery">Gallery</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#contact">Contact</a>
</li>

</ul>

</div>
</div>
</nav>

<section id="home" class="home">

<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png"
class="logo">

<h1>Welcome To BICTOX</h1>

<p>Company Website Design</p>

</section>

<section id="registration" class="bg-light">

<h1 class="text-center mb-5">Registration Page</h1>

<div class="form-box">

<input type="text" class="form-control mb-3" placeholder="Enter Name">

<input type="email" class="form-control mb-3" placeholder="Enter Email">

<input type="password" class="form-control mb-3" placeholder="Enter Password">

<button class="btn btn-primary w-100">
Register
</button>

</div>

</section>

<section id="login">

<h1 class="text-center mb-5">Login Page</h1>

<div class="form-box">

<input type="email" class="form-control mb-3" placeholder="Enter Email">

<input type="password" class="form-control mb-3" placeholder="Enter Password">

<button class="btn btn-success w-100">
Login
</button>

</div>

</section>

<section id="gallery" class="bg-light">

<h1 class="text-center mb-5">Gallery Page</h1>

<div class="container gallery">

<div class="row g-4">

<div class="col-md-4">
<img src="https://picsum.photos/400/300?1">
</div>

<div class="col-md-4">
<img src="https://picsum.photos/400/300?2">
</div>

<div class="col-md-4">
<img src="https://picsum.photos/400/300?3">
</div>

</div>

</div>

</section>

<section id="contact">

<h1 class="text-center mb-5">Contact Page</h1>

<div class="container">

<div class="contact-box">

<h4>Address</h4>

<p>
BICTOX Company,<br>
Ahmedabad, Gujarat, India
</p>

<h4 class="mt-4">Google Map</h4>

<iframe 
src="https://www.google.com/maps?q=Ahmedabad&output=embed">
</iframe>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
