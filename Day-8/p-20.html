<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Search Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-12 font-sans">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-200 bg-slate-50/50 sm:flex sm:items-center sm:justify-between gap-4">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Team Members</h2>
                <p class="text-sm text-slate-500 mt-1">Manage and view your team directory across different locations.</p>
            </div>
            <div class="mt-4 sm:mt-0 relative max-w-xs w-full">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
                    </svg>
                </div>
                <input type="text" id="table-search" placeholder="Search name, role, or city..." 
                    class="block w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Role</th>
                        <th class="px-6 py-4">Location</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 text-sm text-slate-700">
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-900">Sarah Jenkins</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-200">
                                Product Manager
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">London, UK</td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-900">Alex Rivera</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
                                Software Engineer
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">San Francisco, USA</td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-900">Mei Ling</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">
                                UI/UX Designer
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">Tokyo, Japan</td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-900">Marcus Vance</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-sky-50 text-sky-700 border border-sky-200">
                                DevOps Specialist
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">Berlin, Germany</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="p-4 border-t border-slate-200 bg-slate-50/50 flex items-center justify-between text-xs text-slate-500">
            <span>Showing 4 results</span>
            <div class="flex gap-2">
                <button class="px-3 py-1.5 border border-slate-300 rounded bg-white hover:bg-slate-50 font-medium transition-colors">Previous</button>
                <button class="px-3 py-1.5 border border-slate-300 rounded bg-white hover:bg-slate-50 font-medium transition-colors">Next</button>
            </div>
        </div>
    </div>
    <script>
        const searchInput = document.getElementById('table-search');
        const tableRows = document.querySelectorAll('tbody tr');
        searchInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase().trim();
            tableRows.forEach(row => {
                // Checks text content across the entire row
                const text = row.textContent.toLowerCase();
                if (text.includes(value)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
