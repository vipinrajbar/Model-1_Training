<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>    
<body class="bg-slate-50 text-slate-800 antialiased">
    <div class="flex h-screen w-full font-sans overflow-hidden">
        <aside
            class="flex-none w-64 bg-slate-900 text-slate-300 p-6 flex flex-col justify-between border-r border-slate-800">
            <div>
                <div class="text-white font-bold text-xl mb-8 tracking-wider flex items-center gap-2">MyWebsite
                </div>

                <nav class="flex flex-col gap-2">
                    <a href="#home"
                        class="flex items-center px-4 py-2.5 rounded-lg font-medium text-white bg-slate-800 transition-colors duration-200">Home
                    </a>
                    <a href="#about"
                        class="flex items-center px-4 py-2.5 rounded-lg font-medium hover:bg-slate-800 hover:text-white transition-colors duration-200">About
                    </a>
                    <a href="#services"
                        class="flex items-center px-4 py-2.5 rounded-lg font-medium hover:bg-slate-800 hover:text-white transition-colors duration-200">Services
                    </a>
                    <a href="#contact"
                        class="flex items-center px-4 py-2.5 rounded-lg font-medium hover:bg-slate-800 hover:text-white transition-colors duration-200">Contact
                    </a>
                </nav>
            </div>
        </aside>
        <main class="flex-1 p-8 overflow-y-auto flex items-center justify-center min-h-screen bg-slate-50">
            <div
                class="border border-slate-300 rounded-xl p-8 max-w-xl w-full bg-white shadow-sm flex flex-col items-center justify-center text-center">
                <header class="border-b border-slate-200 pb-4 mb-4 w-full">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 tracking-wide">WELCOME</h1> 
                        <p class="text-sm text-slate-500 mt-2"> This is a responsive flexbox layout built with Tailwind CSS.</p>
                    </div>
                </header>
            </div>
        </main>
</body>
</html>
