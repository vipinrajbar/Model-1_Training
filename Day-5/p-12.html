<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Effects Web Page</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:hotpink;
}
header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
}
header h1{
    margin-bottom:15px;
}
.icons i{
    font-size:35px;
    margin:15px;
    color:gold;
    transition:0.5s;
}
.icons i:hover{
    transform:rotate(360deg) scale(1.2);
    color:cyan;
}
.image-section{
    text-align:center;
    padding:50px;
}
.image-section img{
    width:350px;
    border-radius:20px;
    transition:0.5s;
}
.image-section img:hover{
    transform:scale(1.1);
    filter:brightness(120%);
    box-shadow:0 0 20px black;
}
.parallax{
    background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');

    min-height:400px;

    background-attachment:fixed;
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;
}
.sprite-section{
    text-align:center;
    padding:50px;
    background:#ddd;
}
.sprite{
    width:100px;
    height:100px;
    background-image:url('https://i.imgur.com/9Qx6K6B.png');
    background-repeat:no-repeat;
    display:inline-block;
    margin:20px;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>

    <h1>CSS Effects</h1>

</header>

<section class="image-section">

    <h2>Image Hover Effect</h2>
    <br><br>

    <img src="https://picsum.photos/400/300" alt="image">

</section>

<div class="parallax"></div>

<div class="content">

    <h2>Parallax Effect</h2>

    <p>
        This section shows parallax background scrolling using CSS.
    </p>

</div>

<div class="parallax"></div>

<section class="sprite-section">

    <h2>CSS Image Sprites</h2>

</section>

<footer>

    <h3>Created Using HTML & CSS</h3>

</footer>

</body>
</html>
