<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic tac toe</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#121212;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      text-align:center;
    }

    h1{
      color:white;
      margin-bottom:20px;
      font-size:40px;
    }

    .status{
      color:#00ffcc;
      margin-bottom:20px;
      font-size:24px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      gap:10px;
      justify-content:center;
    }

    .cell{
      width:100px;
      height:100px;
      background:#1e1e1e;
      border:2px solid #00ffcc;
      color:white;
      font-size:40px;
      font-weight:bold;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.3s;
    }

    .cell:hover{
      background:#2d2d2d;
      transform:scale(1.05);
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      background:#00ffcc;
      font-size:18px;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:white;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="status" id="status">
      Turn: X
    </div>

    <div class="board" id="board"></div>

    <button onclick="restartGame()">Restart Game</button>
  </div>

  <script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("status");

    let cells = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameOver = false;

    function createBoard() {
      board.innerHTML = "";

      cells.forEach((cell, index) => {
        const cellDiv = document.createElement("div");
        cellDiv.classList.add("cell");
        cellDiv.innerText = cell;

        cellDiv.addEventListener("click", () => handleClick(index));

        board.appendChild(cellDiv);
      });
    }

    function handleClick(index) {
      if (cells[index] !== "" || gameOver) return;

      cells[index] = currentPlayer;

      if (checkWinner()) {
        statusText.innerText = `Winner: ${currentPlayer}`;
        gameOver = true;
      } else if (!cells.includes("")) {
        statusText.innerText = "Draw Game!";
        gameOver = true;
      } else {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.innerText = `Turn: ${currentPlayer}`;
      }

      createBoard();
    }

    function checkWinner() {
      const winPatterns = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8],
        [0,4,8],
        [2,4,6]
      ];

      return winPatterns.some(pattern => {
        const [a,b,c] = pattern;

        return (
          cells[a] &&
          cells[a] === cells[b] &&
          cells[a] === cells[c]
        );
      });
    }

    function restartGame() {
      cells = ["", "", "", "", "", "", "", "", ""];
      currentPlayer = "X";
      gameOver = false;
      statusText.innerText = "Turn: X";

      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
