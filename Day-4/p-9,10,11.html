<style>

         position : absolute; 
         height : 100px;

    }
    #division1{
         background-color : red; 
         float : left; 
         width: 40%; 
        } 
    #division2{

        float : right; 
        width: 48%;
    }
     body{
    background-color: orange;
 }
 @media screen and (min-width: 350px) {

 }
